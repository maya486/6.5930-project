# Fused mapping of GPT-3 workload to TPU v4i
#
# This version fuses operations to reduce memory traffic and improve performance
#
# Fusions applied:
# 1. V/K/Q projections fused (share input I fetch)
# 2. QK + Softmax fused (avoid QK intermediate write)
# 3. Softmax + AV fused (avoid softmax output write)
# 4. FFA + FFB fused (avoid large FFA intermediate)

mapping:
  global:
    target:
      - GlobalBuffer
      - LocalBuffer
      - MAC
    spatial:
      Z: 4

  einsums:
    # Operation 1: I copy (unchanged)
    - name: "I[b, m, d] = I_in[b, m, d]"
      mapping:
        target: GlobalBuffer
        tile:
          M: 4

    # FUSED: V/K/Q projections
    # Instead of 3 separate operations, do them together
    - name: "VKQ_fused"
      operations:
        - "V[b, m, h, e] = I1[b, m, d] * WV[h, e, d]"
        - "K[b, m, h, e] = I1[b, m, d] * WK[h, e, d]"
        - "Q[b, m, h, e] = I1[b, m, d] * WQ[h, e, d]"
      mapping:
        target:
          - LocalBuffer  # Cache all three weight matrices
          - MAC
        spatial:
          Z: 4
          H: 24         # 24 heads per tile
        temporal:
          M: 2048       # 2048 tokens per tile
          E: 128
          D: 12288
        fusion_benefit:
          # I is read once instead of 3 times
          input_reads_saved: 2  # Save 2 reads of I (read once, use 3 times)
          memory_traffic_reduction: "67%"

    # FUSED: QK + Softmax + AV (full attention in one shot)
    - name: "Attention_fused"
      operations:
        - "QK[b, m, p, h] = Q1[b, m, h, e] * K1[b, M: p, h, e]"
        - "QK_softmax[b, m, p, h] = QK1[b, m, p, h]"
        - "AV[b, m, h, f] = QK_softmax1[b, m, p, h] * V1[b, M: p, h, E: f]"
      mapping:
        target:
          - LocalBuffer  # Keep Q, K, V in local buffer
          - MAC
        spatial:
          Z: 4
          H: 24
        temporal:
          # Tile the attention to fit in LocalBuffer
          M: 256        # Smaller tile for M (query tokens)
          P: 256        # Smaller tile for P (key tokens)
          E: 128
        tiling_strategy: |
          For each tile:
          1. Load Q chunk [256, 24, 128] into LocalBuffer
          2. For each P tile:
             a. Load K chunk [256, 24, 128] into LocalBuffer
             b. Compute QK [256, 256, 24] (keep in registers/L1)
             c. Apply softmax (in-place)
             d. Load V chunk [256, 24, 128]
             e. Compute AV partial [256, 24, 128]
             f. Accumulate AV partials
          3. Write final AV [256, 24, 128] to GlobalBuffer

        fusion_benefit:
          intermediates_eliminated: ["QK", "QK_softmax"]
          memory_savings: "48 GB (QK) + 48 GB (QK_softmax) = 96 GB"
          speedup_estimate: "2-3x due to eliminated memory traffic"

    # Operation 8: Z projection (unchanged)
    - name: "Z[b, m, g] = AV1[b, m, h, f] * WZ[h, f, g]"
      mapping:
        target:
          - LocalBuffer
          - MAC
        spatial:
          Z: 4
          H: 24
        temporal:
          M: 2048
          F: 128
          G: 12288

    # FUSED: FFA + FFB (full feed-forward in one shot)
    - name: "FFN_fused"
      operations:
        - "FFA[b, m, c] = Z1[b, m, g] * WFFA[g, c]"
        - "FFB[b, m, j] = FFA1[b, m, c] * WFFB[c, j]"
      mapping:
        target:
          - LocalBuffer  # Cache both weight matrices
          - MAC
        spatial:
          Z: 4
          M: 2048       # Split tokens spatially
        temporal:
          G: 12288
          C: 1024       # Tile C dimension to keep FFA partial in buffer
          J: 12288
        tiling_strategy: |
          For each token tile:
          1. Load Z [2048, 12288] into GlobalBuffer
          2. For each C tile (1024):
             a. Load WFFA chunk [12288, 1024] into LocalBuffer
             b. Compute FFA partial [2048, 1024]
             c. Load WFFB chunk [1024, 12288] into LocalBuffer
             d. Compute FFB partial [2048, 12288]
             e. Accumulate FFB partials
          3. Write final FFB [2048, 12288] to GlobalBuffer

        fusion_benefit:
          intermediates_eliminated: ["FFA"]
          memory_savings: "192 MB (FFA intermediate)"
          speedup_estimate: "1.5-2x due to reduced memory traffic"

# Performance comparison
performance_estimates:
  unfused:
    total_operations: 10
    memory_traffic_gb: 500   # Rough estimate
    estimated_cycles: 1000000

  fused:
    total_operations: 5       # VKQ, Attention, Z, FFN, I
    memory_traffic_gb: 200    # 60% reduction
    estimated_cycles: 400000  # 2.5x speedup
    speedup: "2.5x"

# How to use this mapping with AccelForge
usage: |
  from accelforge import Spec

  # Load architecture, workload, and mapping
  spec = Spec.from_yaml(
      'examples/arches/tpu_v4i.yaml',
      'workloads/gpt3_175B.yaml',
      'mappings/gpt3_fused_to_tpu_v4i.yaml'
  )

  # Run analysis
  results = spec.run()

  # Compare with unfused version
  spec_unfused = Spec.from_yaml(
      'examples/arches/tpu_v4i.yaml',
      'workloads/gpt3_175B.yaml',
      'mappings/gpt3_to_tpu_v4i.yaml'
  )
  results_unfused = spec_unfused.run()

  # Print comparison
  print(f"Unfused energy: {results_unfused.energy}")
  print(f"Fused energy: {results.energy}")
  print(f"Speedup: {results_unfused.cycles / results.cycles}x")
