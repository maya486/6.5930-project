# TPU v4i variant: MEMORY-HEAVY
# - 3x higher memory bandwidth (MainMemory: 1842 GB/s vs 614 GB/s)
# - 3x higher GlobalBuffer bandwidth
# - 50% slower MACs (525 MHz vs 1.05 GHz)
# - 50% fewer processing elements (64x64 vs 128x128)
# - Lower memory energy per access (better memory system)

arch:
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    leak_power: 0
    area: 0 # Don't include off-chip DRAM area
    actions:
      # 3x higher bandwidth: 1842 GB/s instead of 614 GB/s
      # Higher energy per access: 10.0e-12 vs 7.03e-12 (high-performance memory)
    - {name: read, energy: 10.0e-12, latency: 1 / (8 * 1842e9)}
    - {name: write, energy: 10.0e-12, latency: 1 / (8 * 1842e9)}
    tensors: {keep: ~Intermediates, may_keep: All}

  - !Memory
    name: GlobalBuffer
    size: 1024*1024*256*8 # 256MB (2x larger)
    total_latency: max(read_latency, write_latency) # Separate ports
    leak_power: 0
    area: 224e-6 # 224 mm^2 (2x larger)
    actions:
      # 3x higher bandwidth: 6144 GB/s read, 3072 GB/s write (vs 2048/1024)
      # Higher energy: 3.0e-12 read, 3.5e-12 write (high-performance memory)
    - {name: read, energy: 3.0e-12, latency: 1 / (8 * 6144e9)}
    - {name: write, energy: 3.5e-12, latency: 1 / (8 * 3072e9)}
    tensors: {keep: ~MainMemory.tensors, may_keep: All}

  - !Memory
    name: LocalBuffer
    spatial: [{name: Z, fanout: 4, may_reuse: Nothing, min_usage: 1}]
    size: 1024*1024*8*8 # 8MB (2x larger)
    leak_power: 0
    area: 100e-6 # 100 mm^2 (2x larger)
    actions:
      # Higher energy for high-performance local buffer
    - {name: read, energy: 0.40e-12, latency: 0}
    - {name: write, energy: 0.50e-12, latency: 0}
    tensors: {keep: input | output}

  - !Compute
    name: ScalarUnit
    area: 10e-6 # 10 um^2
    leak_power: 0
    actions:
      # Slower scalar unit: 525 MHz vs 1.05 GHz
    - {name: compute, energy: 0, latency: 1 / 0.525e9 / 128}
    enabled: len(All) == 2

  - !Container
    name: ProcessingElement
    spatial:
      # Fewer processing elements: 64x64 = 4096 MACs (vs 128x128 = 16384)
    - {name: reuse_input, fanout: 64, may_reuse: input, reuse: input, min_usage: 1}
    - {name: reuse_output, fanout: 64, may_reuse: output, reuse: output, min_usage: 1}

  - !Memory
    name: Register
    size: weight.bits_per_value if weight else 0
    area: 1e-11 # 10 um^2
    leak_power: 0
    actions:
    - {name: read, energy: 0, latency: 0}
    - {name: write, energy: 0, latency: 0}
    tensors: {keep: weight}

  - !Compute
    name: MAC
    leak_power: 0
    area: 9e-11 # 90 um^2
    actions:
      # Slower compute: 525 MHz vs 1.05 GHz
      # Lower energy for slower MACs: 0.05e-12 vs 0.084e-12
    - {name: compute, energy: 0.05e-12, latency: 1 / 0.525e9}
    enabled: len(All) == 3
