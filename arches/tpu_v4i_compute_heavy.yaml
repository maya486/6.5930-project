# TPU v4i variant: COMPUTE-HEAVY
# - 2x faster MACs (2.1 GHz vs 1.05 GHz)
# - 2x more processing elements (256x256 vs 128x128)
# - 50% lower memory bandwidth (MainMemory: 307 GB/s vs 614 GB/s)
# - 50% lower GlobalBuffer bandwidth
# - Same energy costs but amortized over more operations

arch:
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    leak_power: 0
    area: 0 # Don't include off-chip DRAM area
    actions:
      # Reduced bandwidth: 307 GB/s instead of 614 GB/s
      # Lower energy: 4.0e-12 vs 7.03e-12 (compute-focused, cheap memory)
    - {name: read, energy: 4.0e-12, latency: 1 / (8 * 307e9)}
    - {name: write, energy: 4.0e-12, latency: 1 / (8 * 307e9)}
    tensors: {keep: ~Intermediates, may_keep: All}

  - !Memory
    name: GlobalBuffer
    size: 1024*1024*128*8 # 128MB (same size)
    total_latency: max(read_latency, write_latency) # Separate ports
    leak_power: 0
    area: 112e-6 # 112 mm^2
    actions:
      # Reduced bandwidth: 1024 GB/s read, 512 GB/s write (vs 2048/1024)
      # Lower energy: 1.0e-12 read, 1.3e-12 write (vs 1.88/2.36)
    - {name: read, energy: 1.0e-12, latency: 1 / (8 * 1024e9)}
    - {name: write, energy: 1.3e-12, latency: 1 / (8 * 512e9)}
    tensors: {keep: ~MainMemory.tensors, may_keep: All}

  - !Memory
    name: LocalBuffer
    spatial: [{name: Z, fanout: 4, may_reuse: Nothing, min_usage: 1}]
    size: 1024*1024*4*8 # 4MB
    leak_power: 0
    area: 50e-6 # 50 mm^2
    actions:
      # Lower energy: 0.12e-12 read, 0.15e-12 write (vs 0.249/0.293)
    - {name: read, energy: 0.12e-12, latency: 0}
    - {name: write, energy: 0.15e-12, latency: 0}
    tensors: {keep: input | output}

  - !Compute
    name: ScalarUnit
    area: 10e-6 # 10 um^2
    leak_power: 0
    actions:
    - {name: compute, energy: 0, latency: 1 / 2.1e9 / 128}
    enabled: len(All) == 2

  - !Container
    name: ProcessingElement
    spatial:
      # 2x more processing elements: 256x256 = 65536 MACs (vs 128x128 = 16384)
    - {name: reuse_input, fanout: 256, may_reuse: input, reuse: input, min_usage: 1}
    - {name: reuse_output, fanout: 256, may_reuse: output, reuse: output, min_usage: 1}

  - !Memory
    name: Register
    size: weight.bits_per_value if weight else 0
    area: 1e-11 # 10 um^2
    leak_power: 0
    actions:
    - {name: read, energy: 0, latency: 0}
    - {name: write, energy: 0, latency: 0}
    tensors: {keep: weight}

  - !Compute
    name: MAC
    leak_power: 0
    area: 9e-11 # 90 um^2
    actions:
      # 2x faster compute: 2.1 GHz vs 1.05 GHz
      # Higher energy for faster MACs: 0.15e-12 vs 0.084e-12
    - {name: compute, energy: 0.15e-12, latency: 1 / 2.1e9}
    enabled: len(All) == 3
