# =============================================================================
# FlashAttention Pipeline with Running Statistics
# 4-stage pipeline per chunk: MXU → ScalarUnit → MXU → VPU
# Tracks running max/sum for proper renormalization
# =============================================================================

workload:
  rank_sizes:
    {% set BATCH_SIZE = BATCH_SIZE | default(1) %}
    {% set N_TOKENS = N_TOKENS | default(256) %}
    {% set N_NEW_TOKENS = N_NEW_TOKENS | default(1) %}
    {% set CHUNK_SIZE = CHUNK_SIZE | default(64) %}

    B: {{BATCH_SIZE}}
    M: {{N_NEW_TOKENS}}
    M_FULL: {{N_TOKENS}}
    M_CHUNK: {{CHUNK_SIZE}}
    H: 96
    E: 128
    D: 96*128

  bits_per_value: {All: 8}
  persistent_tensors: weight - Intermediates

  einsums:
    # =========================================================================
    # CHUNK 0: Tokens 0-63
    # =========================================================================

    # Stage 1 (MXU): Compute attention scores Q @ K_0^T
    - einsum: "QK_0[b, m, m_chunk, h] = Q[b, m, h, e] * K_0[b, m_chunk, h, e]"
      renames: {input: Q}

    # Stage 2 (ScalarUnit): All scalar ops together
    # Reduce to get max over m_chunk, compute softmax, update running stats
    - "max_0[b, m, h] = QK_0[b, m, M_CHUNK: m_chunk, h]"  # max reduction
    - "exp_0[b, m, m_chunk, h] = QK_0[b, m, m_chunk, h]"  # exp(QK - max)
    - "sum_0[b, m, h] = exp_0[b, m, M_CHUNK: m_chunk, h]"  # sum reduction
    - "softmax_0[b, m, m_chunk, h] = exp_0[b, m, m_chunk, h]"  # divide by sum
    - einsum: "running_max[b, m, h] = max_0[b, m, h]"  # initialize running max
      is_copy_operation: true
    - einsum: "running_sum[b, m, h] = sum_0[b, m, h]"  # initialize running sum
      is_copy_operation: true

    # Stage 3 (MXU): Apply attention to values
    - einsum: "AV_0[b, m, h, e] = softmax_0[b, m, m_chunk, h] * V_0[b, m_chunk, h, e]"
      renames: {input: softmax_0}

    # Stage 4 (VPU): Initialize accumulator
    - einsum: "AV_accum[b, m, h, e] = AV_0[b, m, h, e]"
      is_copy_operation: true

    # =========================================================================
    # CHUNK 1: Tokens 64-127
    # =========================================================================

    # Stage 1 (MXU): Compute attention scores Q @ K_1^T
    - einsum: "QK_1[b, m, m_chunk, h] = Q[b, m, h, e] * K_1[b, m_chunk, h, e]"
      renames: {input: Q}

    # Stage 2 (ScalarUnit): Scalar ops + running stat updates
    - "max_1[b, m, h] = QK_1[b, m, M_CHUNK: m_chunk, h]"
    - "new_max_1[b, m, h] = running_max[b, m, h] + max_1[b, m, h]"  # max(old, new)
    - "old_scale_1[b, m, h] = running_max[b, m, h]"  # exp(old_max - new_max)
    - "new_scale_1[b, m, h] = max_1[b, m, h]"  # exp(max_1 - new_max)
    - "exp_1[b, m, m_chunk, h] = QK_1[b, m, m_chunk, h]"
    - "sum_1[b, m, h] = exp_1[b, m, M_CHUNK: m_chunk, h]"
    - "updated_sum_1[b, m, h] = running_sum[b, m, h] + sum_1[b, m, h]"  # renormalized sum
    - "softmax_1[b, m, m_chunk, h] = exp_1[b, m, m_chunk, h]"
    - einsum: "running_max_1[b, m, h] = new_max_1[b, m, h]"  # update running max
      is_copy_operation: true
    - einsum: "running_sum_1[b, m, h] = updated_sum_1[b, m, h]"  # update running sum
      is_copy_operation: true

    # Stage 3 (MXU): Apply attention to values
    - einsum: "AV_1[b, m, h, e] = softmax_1[b, m, m_chunk, h] * V_1[b, m_chunk, h, e]"
      renames: {input: softmax_1}

    # Stage 4 (VPU): Accumulate with renormalization
    - "AV_scaled[b, m, h, e] = AV_accum[b, m, h, e]"  # scale by old_scale_1
    - einsum: "AV_accum_1[b, m, h, e] = AV_scaled[b, m, h, e] + AV_1[b, m, h, e]"
      renames: {input: AV_scaled}

    # =========================================================================
    # CHUNK 2: Tokens 128-191
    # =========================================================================

    # Stage 1 (MXU)
    - einsum: "QK_2[b, m, m_chunk, h] = Q[b, m, h, e] * K_2[b, m_chunk, h, e]"
      renames: {input: Q}

    # Stage 2 (ScalarUnit)
    - "max_2[b, m, h] = QK_2[b, m, M_CHUNK: m_chunk, h]"
    - "new_max_2[b, m, h] = running_max_1[b, m, h] + max_2[b, m, h]"
    - "old_scale_2[b, m, h] = running_max_1[b, m, h]"
    - "new_scale_2[b, m, h] = max_2[b, m, h]"
    - "exp_2[b, m, m_chunk, h] = QK_2[b, m, m_chunk, h]"
    - "sum_2[b, m, h] = exp_2[b, m, M_CHUNK: m_chunk, h]"
    - "updated_sum_2[b, m, h] = running_sum_1[b, m, h] + sum_2[b, m, h]"
    - "softmax_2[b, m, m_chunk, h] = exp_2[b, m, m_chunk, h]"
    - einsum: "running_max_2[b, m, h] = new_max_2[b, m, h]"
      is_copy_operation: true
    - einsum: "running_sum_2[b, m, h] = updated_sum_2[b, m, h]"
      is_copy_operation: true

    # Stage 3 (MXU)
    - einsum: "AV_2[b, m, h, e] = softmax_2[b, m, m_chunk, h] * V_2[b, m_chunk, h, e]"
      renames: {input: softmax_2}

    # Stage 4 (VPU)
    - "AV_scaled_2[b, m, h, e] = AV_accum_1[b, m, h, e]"
    - einsum: "AV_accum_2[b, m, h, e] = AV_scaled_2[b, m, h, e] + AV_2[b, m, h, e]"
      renames: {input: AV_scaled_2}

    # =========================================================================
    # CHUNK 3: Tokens 192-255
    # =========================================================================

    # Stage 1 (MXU)
    - einsum: "QK_3[b, m, m_chunk, h] = Q[b, m, h, e] * K_3[b, m_chunk, h, e]"
      renames: {input: Q}

    # Stage 2 (ScalarUnit)
    - "max_3[b, m, h] = QK_3[b, m, M_CHUNK: m_chunk, h]"
    - "new_max_3[b, m, h] = running_max_2[b, m, h] + max_3[b, m, h]"
    - "old_scale_3[b, m, h] = running_max_2[b, m, h]"
    - "new_scale_3[b, m, h] = max_3[b, m, h]"
    - "exp_3[b, m, m_chunk, h] = QK_3[b, m, m_chunk, h]"
    - "sum_3[b, m, h] = exp_3[b, m, M_CHUNK: m_chunk, h]"
    - "updated_sum_3[b, m, h] = running_sum_2[b, m, h] + sum_3[b, m, h]"
    - "softmax_3[b, m, m_chunk, h] = exp_3[b, m, m_chunk, h]"
    - einsum: "final_sum[b, m, h] = updated_sum_3[b, m, h]"  # final normalization factor
      is_copy_operation: true

    # Stage 3 (MXU)
    - einsum: "AV_3[b, m, h, e] = softmax_3[b, m, m_chunk, h] * V_3[b, m_chunk, h, e]"
      renames: {input: softmax_3}

    # Stage 4 (VPU): Final accumulation and normalization
    - "AV_scaled_3[b, m, h, e] = AV_accum_2[b, m, h, e]"
    - einsum: "AV_final[b, m, h, e] = AV_scaled_3[b, m, h, e] + AV_3[b, m, h, e]"
      renames: {input: AV_scaled_3}
    - einsum: "Output[b, m, h, e] = AV_final[b, m, h, e]"  # divide by final_sum
      is_copy_operation: true

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates if len(All) == 3 else Inputs
      # Removed expected_count to allow multiple inputs (e.g., element-wise add)
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      # Removed expected_count to allow flexibility
