arch:
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    leak_power: 0
    area: 0
    actions:
    - {name: read, energy: 7.03e-12, latency: 1 / (8 * 614e9)}
    - {name: write, energy: 7.03e-12, latency: 1 / (8 * 614e9)}
    tensors: {keep: ~Intermediates, may_keep: All}

  - !Memory
    name: GlobalBuffer
    size: 1024*1024*128*8
    total_latency: max(read_latency, write_latency)
    leak_power: 0
    area: 112e-6
    actions:
    - {name: read, energy: 1.88e-12, latency: 1 / (8 * 2048e9)}
    - {name: write, energy: 2.36e-12, latency: 1 / (8 * 1024e9)}
    tensors: {keep: ~MainMemory.tensors, may_keep: All}

  - !Fork
    nodes:
    - !Memory
      name: ScalarBuffer
      spatial: [{name: Z, fanout: 128, may_reuse: Nothing, min_usage: 1}]
      size: 1024*1024/2
      leak_power: 0
      area: 51e-6
      actions:
      - {name: read, energy: 0.249e-12, latency: 0}
      - {name: write, energy: 0.293e-12, latency: 0}
      tensors: {keep: input | output}

    - !Compute
      name: ScalarUnit
      area: 8.7e-6
      leak_power: 0
      actions:
      - {name: compute, energy: 1.2e-12, latency: 1 / 1.05e9}
      enabled: len(All) == 2

  - !Fork
    nodes:
    - !Memory
      name: VpuBuffer
      # VPU with 96×128 = 12,288 PEs (enough for h×e dimensions)
      spatial:
        - {name: spatial_h, fanout: 96, may_reuse: Nothing, min_usage: 1}
        - {name: spatial_e, fanout: 128, may_reuse: Nothing, min_usage: 1}
      size: 1024*1024*4
      leak_power: 0
      area: 51e-6
      actions:
      - {name: read, energy: 0.249e-12, latency: 0}
      - {name: write, energy: 0.293e-12, latency: 0}
      tensors: {keep: input | output}

    - !Compute
      name: VPU
      leak_power: 0
      area: 8.5e-10/128
      actions:
      - {name: compute, energy: 0.32e-12, latency: 1 / 1.05e9}
      enabled: len(All) == 3
