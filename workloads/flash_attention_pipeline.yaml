# =============================================================================
# Simplified FlashAttention Pipeline
# 4-stage pipeline per chunk: MXU → ScalarUnit → MXU → VPU
# =============================================================================

workload:
  rank_sizes:
    {% set BATCH_SIZE = BATCH_SIZE | default(1) %}
    {% set N_TOKENS = N_TOKENS | default(256) %}
    {% set N_NEW_TOKENS = N_NEW_TOKENS | default(1) %}
    {% set CHUNK_SIZE = CHUNK_SIZE | default(64) %}

    B: {{BATCH_SIZE}}
    M: {{N_NEW_TOKENS}}
    M_FULL: {{N_TOKENS}}
    M_CHUNK: {{CHUNK_SIZE}}
    H: 96
    E: 128
    D: 96*128

  bits_per_value: {All: 8}
  persistent_tensors: weight - Intermediates

  einsums:
    # =========================================================================
    # CHUNK 0: Tokens 0-63
    # =========================================================================

    # Stage 1 (MXU): Compute attention scores
    - einsum: "QK_0[b, m, m_chunk, h] = Q[b, m, h, e] * K_0[b, m_chunk, h, e]"
      renames: {input: Q}

    # Stage 2 (ScalarUnit): Approximate softmax (element-wise)
    - "scores_softmax_0[b, m, m_chunk, h] = QK_0[b, m, m_chunk, h]"

    # Stage 3 (MXU): Apply attention to values
    - einsum: "AV_chunk_0[b, m, h, e] = scores_softmax_0[b, m, m_chunk, h] * V_0[b, m_chunk, h, e]"
      renames: {input: scores_softmax_0}

    # Stage 4 (VPU): Initialize accumulator (copy operation)
    - einsum: "AV_accum_0[b, m, h, e] = AV_chunk_0[b, m, h, e]"
      is_copy_operation: true

    # =========================================================================
    # CHUNK 1: Tokens 64-127
    # =========================================================================

    # Stage 1 (MXU): Compute attention scores
    - einsum: "QK_1[b, m, m_chunk, h] = Q[b, m, h, e] * K_1[b, m_chunk, h, e]"
      renames: {input: Q}

    # Stage 2 (ScalarUnit): Approximate softmax
    - "scores_softmax_1[b, m, m_chunk, h] = QK_1[b, m, m_chunk, h]"

    # Stage 3 (MXU): Apply attention to values
    - einsum: "AV_chunk_1[b, m, h, e] = scores_softmax_1[b, m, m_chunk, h] * V_1[b, m_chunk, h, e]"
      renames: {input: scores_softmax_1}

    # Stage 4 (VPU): Accumulate with renormalization approximation
    - einsum: "AV_accum_1[b, m, h, e] = AV_accum_0[b, m, h, e] + AV_chunk_1[b, m, h, e]"
      renames: {input: AV_accum_0}

    # =========================================================================
    # CHUNK 2: Tokens 128-191
    # =========================================================================

    # Stage 1 (MXU): Compute attention scores
    - einsum: "QK_2[b, m, m_chunk, h] = Q[b, m, h, e] * K_2[b, m_chunk, h, e]"
      renames: {input: Q}

    # Stage 2 (ScalarUnit): Approximate softmax
    - "scores_softmax_2[b, m, m_chunk, h] = QK_2[b, m, m_chunk, h]"

    # Stage 3 (MXU): Apply attention to values
    - einsum: "AV_chunk_2[b, m, h, e] = scores_softmax_2[b, m, m_chunk, h] * V_2[b, m_chunk, h, e]"
      renames: {input: scores_softmax_2}

    # Stage 4 (VPU): Accumulate
    - einsum: "AV_accum_2[b, m, h, e] = AV_accum_1[b, m, h, e] + AV_chunk_2[b, m, h, e]"
      renames: {input: AV_accum_1}

    # =========================================================================
    # CHUNK 3: Tokens 192-255
    # =========================================================================

    # Stage 1 (MXU): Compute attention scores
    - einsum: "QK_3[b, m, m_chunk, h] = Q[b, m, h, e] * K_3[b, m_chunk, h, e]"
      renames: {input: Q}

    # Stage 2 (ScalarUnit): Approximate softmax
    - "scores_softmax_3[b, m, m_chunk, h] = QK_3[b, m, m_chunk, h]"

    # Stage 3 (MXU): Apply attention to values
    - einsum: "AV_chunk_3[b, m, h, e] = scores_softmax_3[b, m, m_chunk, h] * V_3[b, m_chunk, h, e]"
      renames: {input: scores_softmax_3}

    # Stage 4 (VPU): Final accumulation
    - einsum: "Output[b, m, h, e] = AV_accum_2[b, m, h, e] + AV_chunk_3[b, m, h, e]"
      renames: {input: AV_accum_2}

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates if len(All) == 3 else Inputs
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1 if len(All) == 3 else 0
